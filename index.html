<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jalandhar Fitness Club</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Inter', Arial, sans-serif;
    color: #fff;
    background: radial-gradient(circle at top, #1a2538 0%, #0b1019 45%, #05070c 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 760px;
    background: linear-gradient(160deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 24px;
    padding: 34px 24px;
    backdrop-filter: blur(12px);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
    animation: rise .7s ease;
}

@keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}

h1, h2 {
    margin: 0;
    font-family: 'Cinzel', serif;
    letter-spacing: 2px;
}

h1 { font-size: clamp(2rem, 8vw, 3rem); }
h2 { font-size: clamp(1.4rem, 6vw, 2rem); opacity: 0.9; }

.tagline {
    margin-top: 14px;
    opacity: .85;
    font-weight: 600;
}

.badges {
    margin: 18px auto 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
}

.badge {
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    letter-spacing: .4px;
    background: rgba(255,255,255,.06);
}

.cta-row {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
}

button {
    padding: 12px 26px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    transition: .25s ease;
}

.login-btn { background: #fff; color: #000; }
.login-btn:hover { transform: translateY(-2px); }

.subscribe-btn {
    background: linear-gradient(135deg, #00ffa3, #66f0ff);
    color: #00150f;
    box-shadow: 0 12px 30px rgba(0,255,163,.32);
    animation: pulse 2.1s infinite;
}

@keyframes pulse {
    50% { box-shadow: 0 18px 42px rgba(0,255,163,.45); }
}

.workout-gif {
    margin-top: 22px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.2);
}

.workout-gif img {
    display: block;
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.small-text { margin-top: 14px; font-size: 13px; opacity: .75; }
</style>
</head>
<body>
<div class="container">
    <h1>Jalandhar</h1>
    <h2>Fitness Club</h2>
    <div class="tagline">Gym Programs • Strength • Fat Loss • Premium Coaching</div>

    <div class="badges">
        <div class="badge">Strength Training</div>
        <div class="badge">Muscle Building</div>
        <div class="badge">Shred Plans</div>
        <div class="badge">Coach Support</div>
    </div>

    <div class="cta-row">
        <button class="login-btn" onclick="window.location.href='login.html'">Member Login</button>
        <a href="plans.html" style="text-decoration:none;">
            <button class="subscribe-btn">Choose Your Plan</button>
        </a>
    </div>

    <div class="workout-gif">
        <img src="https://media.giphy.com/media/l3vR85PnGsBwu1PFK/giphy.gif" alt="Gym workout training animation">
    </div>

    <div class="small-text">Weekly Auto Billing • Cancel Anytime • Instant Access</div>
</div>
</body>
</html>
