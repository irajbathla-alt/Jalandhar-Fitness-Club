<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jalandhar Fitness Club</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #050507;
    --card: rgba(255, 255, 255, 0.08);
    --accent: #00ffa3;
    --accent-2: #5bf7ff;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Inter', Arial, sans-serif;
    color: #fff;
    background: radial-gradient(circle at 15% 20%, #17202d 0%, #090b10 40%, #050507 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
    overflow-x: hidden;
}

body::before,
body::after {
    content: "";
    position: fixed;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    filter: blur(70px);
    z-index: -1;
    animation: glowMove 9s ease-in-out infinite alternate;
}

body::before {
    background: rgba(91, 247, 255, 0.22);
    top: -120px;
    right: -80px;
}

body::after {
    background: rgba(0, 255, 163, 0.18);
    bottom: -180px;
    left: -120px;
    animation-delay: 1.8s;
}

@keyframes glowMove {
    from { transform: translateY(0) translateX(0); }
    to { transform: translateY(20px) translateX(-20px); }
}

.container {
    width: 100%;
    max-width: 980px;
    background: linear-gradient(150deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 26px;
    padding: 32px;
    backdrop-filter: blur(14px);
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
    animation: fadeUp .9s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

.top {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 28px;
    align-items: center;
}

h1, h2 {
    margin: 0;
    font-family: 'Cinzel', serif;
    letter-spacing: 2px;
}

h1 { font-size: clamp(2rem, 6vw, 3.2rem); }
h2 { font-size: clamp(1.5rem, 4vw, 2.2rem); opacity: 0.9; }

.tagline { margin-top: 14px; opacity: .8; font-size: 1rem; }

.cta-row {
    margin-top: 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

button {
    padding: 12px 26px;
    border-radius: 999px;
    border: 1px solid transparent;
    cursor: pointer;
    font-weight: 700;
    transition: .25s ease;
}

.login-btn {
    background: #fff;
    color: #000;
}

.login-btn:hover { transform: translateY(-2px) scale(1.02); }

.subscribe-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #00130d;
    box-shadow: 0 14px 35px rgba(0,255,163,.3);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 14px 35px rgba(0,255,163,.25); }
    50% { box-shadow: 0 18px 45px rgba(0,255,163,.45); }
}

.subscribe-btn:hover { transform: translateY(-2px) scale(1.03); }

.small-text { margin-top: 14px; font-size: 13px; opacity: .7; }

.preview-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(120px, 1fr));
    gap: 12px;
}

.preview-card {
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 14px;
    overflow: hidden;
    background: rgba(255,255,255,.05);
    transform: translateY(0);
    transition: .3s ease;
}

.preview-card:hover { transform: translateY(-4px); }

.preview-card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    display: block;
}

.preview-card .label {
    font-size: 12px;
    letter-spacing: .8px;
    opacity: .8;
    padding: 8px;
    text-align: center;
}

@media (max-width: 760px) {
    .top { grid-template-columns: 1fr; }
    .container { padding: 24px; }
}
</style>
</head>
<body>
<div class="container">
    <div class="top">
        <div>
            <h1>Jalandhar</h1>
            <h2>Fitness Club</h2>
            <div class="tagline">More Than Motivation • Premium Coaching Energy</div>

            <div class="cta-row">
                <button class="login-btn" onclick="window.location.href='login.html'">Member Login</button>
                <a href="https://square.link/u/E4LYxGUQ" target="_blank" style="text-decoration:none;">
                    <button class="subscribe-btn">Subscribe – $2 / Week</button>
                </a>
            </div>

            <div class="small-text">Weekly Auto Billing • Cancel Anytime • Instant Access</div>
        </div>

        <div class="preview-grid">
            <div class="preview-card">
                <img src="https://media.giphy.com/media/l3vR85PnGsBwu1PFK/giphy.gif" alt="Strength training gif">
                <div class="label">STRENGTH</div>
            </div>
            <div class="preview-card">
                <img src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif" alt="Cardio workout gif">
                <div class="label">SHRED</div>
            </div>
            <div class="preview-card">
                <img src="https://media.giphy.com/media/xT9IgG50Fb7Mi0prBC/giphy.gif" alt="Fitness motivation gif">
                <div class="label">MOBILITY</div>
            </div>
            <div class="preview-card">
                <img src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif" alt="Coach energy gif">
                <div class="label">PREMIUM COACHING</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
