<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Dashboard</title>
<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
}

.panel {
    max-width: 440px;
    width: 100%;
    padding: 28px;
    border: 1px solid #222;
    border-radius: 16px;
    background: #0d0d0d;
}

.message {
    font-size: 20px;
    line-height: 1.4;
}

.subtext {
    margin-top: 12px;
    font-size: 14px;
    opacity: 0.75;
}
</style>
</head>
<body>

<div class="panel">
    <div class="message" id="message">Checking Membership...</div>
    <div class="subtext" id="subtext">Please wait while we verify your account.</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTQDlsZNhZ-I6CvlNgZDPgpJJYlYto6Rk",
  authDomain: "jalandhar-fitness-club.firebaseapp.com",
  projectId: "jalandhar-fitness-club",
  storageBucket: "jalandhar-fitness-club.firebasestorage.app",
  messagingSenderId: "899365845803",
  appId: "1:899365845803:web:a75a331462df8b017f236e"
};

initializeApp(firebaseConfig);
const auth = getAuth();
const CSV_URL = "https://docs.google.com/spreadsheets/d/1lXYKjtW2BzFEuIouRl04O8AT8zyiUaz3QwBHxsDwFqk/export?format=csv";

function setStatus(message, subtext = "") {
    document.getElementById("message").textContent = message;
    document.getElementById("subtext").textContent = subtext;
}

function parseCsvLine(line) {
    const values = [];
    let current = "";
    let inQuotes = false;

    for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
            if (inQuotes && next === '"') {
                current += '"';
                i += 1;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (char === "," && !inQuotes) {
            values.push(current.trim());
            current = "";
        } else {
            current += char;
        }
    }

    values.push(current.trim());
    return values;
}

async function getMemberData(email) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);

    try {
        const response = await fetch(CSV_URL, { signal: controller.signal, cache: "no-store" });
        if (!response.ok) {
            throw new Error("Membership server unavailable");
        }

        const text = await response.text();
        const rows = text
            .split(/\r?\n/)
            .map((row) => row.trim())
            .filter((row) => row !== "" && !row.toLowerCase().startsWith("email"));

        const targetEmail = email.trim().toLowerCase();

        for (const row of rows) {
            const [sheetEmail = "", program = "", expiry = "", status = ""] = parseCsvLine(row);

            if (sheetEmail.trim().toLowerCase() === targetEmail) {
                return {
                    program: program.trim().toLowerCase(),
                    expiry: expiry.trim(),
                    status: status.trim().toLowerCase()
                };
            }
        }

        return null;
    } finally {
        clearTimeout(timeout);
    }
}

function getProgramPage(program) {
    const normalized = program.trim().toLowerCase();
    const routeMap = {
        shred: "shred.html",
        strength: "strength.html",
        bikini: "bikini.html"
    };

    return routeMap[normalized] || null;
}

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    try {
        const data = await getMemberData(user.email || "");

        if (!data) {
            setStatus("Pending Approval", "Your account exists, but your membership has not been activated yet.");
            return;
        }

        if (data.status !== "active") {
            setStatus("Subscription Required — $2/Week", "Please subscribe, then login again after approval.");
            return;
        }

        const expiryDate = new Date(data.expiry);
        if (Number.isNaN(expiryDate.getTime())) {
            setStatus("Membership Date Error", "Please contact support to update your expiry date.");
            return;
        }

        expiryDate.setHours(23, 59, 59, 999);

        if (new Date() > expiryDate) {
            setStatus("Membership Expired", "Please renew your membership to continue.");
            return;
        }

        const destination = getProgramPage(data.program);
        if (destination) {
            window.location.href = destination;
            return;
        }

        setStatus("Program Not Assigned", "Please contact support to assign your training program.");
    } catch (error) {
        setStatus("Unable to Verify Membership", "Please check your connection and try again in a moment.");
        console.error(error);
    }
});
</script>

</body>
</html>
