<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Dashboard</title>
<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: radial-gradient(circle at top, #1c2a40 0%, #0b1019 45%, #05070c 100%);
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
}

.panel {
    max-width: 470px;
    width: 100%;
    padding: 26px;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 18px;
    background: linear-gradient(160deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
    backdrop-filter: blur(10px);
    box-shadow: 0 24px 60px rgba(0,0,0,.45);
    animation: reveal .6s ease;
}

.title {
    margin: 0 0 8px;
    letter-spacing: .8px;
}

.message {
    font-size: 21px;
    line-height: 1.35;
}

.subtext {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
}

.action-btn {
    margin-top: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 11px 18px;
    border-radius: 999px;
    color: #07161f;
    font-weight: 700;
    background: linear-gradient(135deg, #00ffa3, #66f0ff);
    box-shadow: 0 12px 26px rgba(0,255,163,.24);
    transition: transform .2s ease, filter .2s ease;
}

.action-btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.08);
}

.status-gif {
    margin-top: 16px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.18);
}

.status-gif img {
    display: block;
    width: 100%;
    height: 145px;
    object-fit: cover;
}

@keyframes reveal {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="panel">
    <h3 class="title">Gym Membership Status</h3>
    <div class="message" id="message">Checking Membership...</div>
    <div class="subtext" id="subtext">Please wait while we verify your workout access.</div>
    <div class="status-gif">
        <img src="https://media.giphy.com/media/111ebonMs90YLu/giphy.gif" alt="Gym motivation animation">
    </div>
    <a class="action-btn" id="actionBtn" href="plans.html" style="display:none;">View Plans</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTQDlsZNhZ-I6CvlNgZDPgpJJYlYto6Rk",
  authDomain: "jalandhar-fitness-club.firebaseapp.com",
  projectId: "jalandhar-fitness-club",
  storageBucket: "jalandhar-fitness-club.firebasestorage.app",
  messagingSenderId: "899365845803",
  appId: "1:899365845803:web:a75a331462df8b017f236e"
};

initializeApp(firebaseConfig);
const auth = getAuth();
const CSV_URL = "https://docs.google.com/spreadsheets/d/1lXYKjtW2BzFEuIouRl04O8AT8zyiUaz3QwBHxsDwFqk/export?format=csv";

function setStatus(message, subtext = "", showPlans = false) {
    document.getElementById("message").textContent = message;
    document.getElementById("subtext").textContent = subtext;
    document.getElementById("actionBtn").style.display = showPlans ? "inline-flex" : "none";
}

function parseCsvLine(line) {
    const values = [];
    let current = "";
    let inQuotes = false;

    for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
            if (inQuotes && next === '"') {
                current += '"';
                i += 1;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (char === "," && !inQuotes) {
            values.push(current.trim());
            current = "";
        } else {
            current += char;
        }
    }

    values.push(current.trim());
    return values;
}

async function getMemberData(email) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);

    try {
        const response = await fetch(CSV_URL, { signal: controller.signal, cache: "no-store" });
        if (!response.ok) {
            throw new Error("Membership server unavailable");
        }

        const text = await response.text();
        const rows = text
            .split(/\r?\n/)
            .map((row) => row.trim())
            .filter((row) => row !== "" && !row.toLowerCase().startsWith("email"));

        const targetEmail = email.trim().toLowerCase();

        for (const row of rows) {
            const [sheetEmail = "", program = "", expiry = "", status = ""] = parseCsvLine(row);

            if (sheetEmail.trim().toLowerCase() === targetEmail) {
                return {
                    program: program.trim().toLowerCase(),
                    expiry: expiry.trim(),
                    status: status.trim().toLowerCase()
                };
            }
        }

        return null;
    } finally {
        clearTimeout(timeout);
    }
}

function getProgramPage(program) {
    const normalized = program.trim().toLowerCase();
    const routeMap = {
        shred: "shred.html",
        strength: "strength.html",
        bikini: "bikini.html"
    };

    return routeMap[normalized] || null;
}

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    try {
        const data = await getMemberData(user.email || "");

        if (!data) {
            setStatus("Pending Approval", "Your gym membership is being activated.");
            return;
        }

        if (data.status !== "active") {
            setStatus("Subscription Required", "Choose a plan to unlock your workout program.", true);
            return;
        }

        const expiryDate = new Date(data.expiry);
        if (Number.isNaN(expiryDate.getTime())) {
            setStatus("Membership Date Error", "Please contact support to fix expiry date.");
            return;
        }

        expiryDate.setHours(23, 59, 59, 999);

        if (new Date() > expiryDate) {
            setStatus("Membership Expired", "Renew your gym membership to continue training.", true);
            return;
        }

        const destination = getProgramPage(data.program);
        if (destination) {
            window.location.href = destination;
            return;
        }

        setStatus("Program Not Assigned", "Ask support to assign your gym program.");
    } catch (error) {
        setStatus("Unable to Verify Membership", "Please check your internet and try again.");
        console.error(error);
    }
});
</script>
</body>
</html>
