<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Access</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at 20% 10%, #152031 0%, #090b10 35%, #050507 100%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
}

.wrapper {
    width: 100%;
    max-width: 420px;
    padding: 40px 30px;
    background: linear-gradient(150deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    animation: enter .6s ease;
}



@keyframes enter {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    text-align: center;
    margin-bottom: 34px;
}

.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 20px;
}

label {
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 6px;
}

input {
    padding: 14px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
}

input:focus {
    outline: none;
    border: 1px solid #555;
}

.button-group {
    margin-top: 26px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

button {
    transition: 0.2s ease;
}

.primary-btn {
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg,#ffffff,#c7ffe9);
    color: #000;
    font-weight: 600;
    cursor: pointer;
}

.primary-btn:hover {
    transform: translateY(-1px);
}

.secondary-btn {
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #333;
    background: transparent;
    color: #fff;
    cursor: pointer;
}

.secondary-btn:hover {
    background: #fff;
    color: #000;
}

.wrapper::after {
    content: "";
    display: block;
    margin-top: 18px;
    height: 130px;
    border-radius: 12px;
    background-image: url('https://media.giphy.com/media/3o7TKtnuHOHHUjR38Y/giphy.gif');
    background-size: cover;
    background-position: center;
    opacity: 0.82;
    border: 1px solid rgba(255,255,255,0.16);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.message {
    margin-top: 18px;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
    opacity: 0.95;
    white-space: pre-line;
}
</style>
</head>

<body>

<div class="wrapper">

    <h1>Member Access</h1>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" autocomplete="email" required>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
    </div>

    <div class="button-group">
        <button id="signInBtn" class="primary-btn" onclick="login()">Sign In</button>
        <button id="createBtn" class="secondary-btn" onclick="register()">Create Account</button>
    </div>

    <div class="message" id="message"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTQDlsZNhZ-I6CvlNgZDPgpJJYlYto6Rk",
  authDomain: "jalandhar-fitness-club.firebaseapp.com",
  projectId: "jalandhar-fitness-club",
  storageBucket: "jalandhar-fitness-club.firebasestorage.app",
  messagingSenderId: "899365845803",
  appId: "1:899365845803:web:a75a331462df8b017f236e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPYoPFV6Ez73oq38hebKGFYEEqyOhCd8gBxwlChwJUoGWOc2HiEFurNUX2KXidjz0/exec";
const SECRET = "JFC2026PRIVATEKEY";

function setBusy(isBusy) {
    document.getElementById("signInBtn").disabled = isBusy;
    document.getElementById("createBtn").disabled = isBusy;
}

function setMessage(text, color = "#ffffff") {
    const message = document.getElementById("message");
    message.style.color = color;
    message.textContent = text;
}

function getCredentials() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        setMessage("Please enter both email and password.", "#ff8080");
        return null;
    }

    return { email, password };
}

window.login = async function() {
    const credentials = getCredentials();
    if (!credentials) {
        return;
    }

    setBusy(true);
    setMessage("Signing in...");

    try {
        await signInWithEmailAndPassword(auth, credentials.email, credentials.password);
        window.location.href = "dashboard.html";
    } catch (error) {
        setMessage(error.message, "#ff8080");
    } finally {
        setBusy(false);
    }
};

window.register = async function() {
    const credentials = getCredentials();
    if (!credentials) {
        return;
    }

    setBusy(true);
    setMessage("Creating account...");

    try {
        await createUserWithEmailAndPassword(auth, credentials.email, credentials.password);

        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email: credentials.email,
                secret: SECRET
            })
        });

        setMessage(
            "Account created successfully.\n\n" +
            "Please subscribe first.\n" +
            "Approval within 24 hours.\n" +
            "You will be redirected shortly.",
            "#00ff99"
        );

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 5000);
    } catch (error) {
        setMessage(error.message, "#ff8080");
        setBusy(false);
    }
};
</script>

</body>
</html>
