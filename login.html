<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Access</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: radial-gradient(circle at top, #1c2940 0%, #0b1019 45%, #05070c 100%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 16px;
}

.wrapper {
    width: 100%;
    max-width: 430px;
    padding: 36px 26px;
    background: linear-gradient(160deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    animation: enter .6s ease;
}

@keyframes enter {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    margin-bottom: 8px;
}

.subtitle {
    font-size: 13px;
    opacity: .78;
    margin-bottom: 24px;
}

.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 16px;
}

label {
    font-size: 13px;
    opacity: 0.8;
    margin-bottom: 6px;
}

input {
    padding: 13px;
    background: #141a24;
    border: 1px solid #324054;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    text-align: center;
}

input:focus {
    outline: none;
    border-color: #62ffd7;
}

.button-group {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

button { transition: 0.2s ease; }

.primary-btn {
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg,#ffffff,#bfffe9);
    color: #000;
    font-weight: 700;
    cursor: pointer;
}

.secondary-btn {
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #3a4c64;
    background: transparent;
    color: #fff;
    cursor: pointer;
}

button:hover { transform: translateY(-1px); }

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.gym-gif {
    margin-top: 16px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.2);
}

.gym-gif img {
    display: block;
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.wrapper::after {
    content: "";
    display: block;
    margin-top: 18px;
    height: 130px;
    border-radius: 12px;
    background-image: url('https://media.giphy.com/media/3o7TKtnuHOHHUjR38Y/giphy.gif');
    background-size: cover;
    background-position: center;
    opacity: 0.82;
    border: 1px solid rgba(255,255,255,0.16);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.message {
    margin-top: 15px;
    font-size: 13px;
    min-height: 20px;
    white-space: pre-line;
}
</style>
</head>
<body>
<div class="wrapper">
    <h1>Member Access</h1>
    <div class="subtitle">Sign in to open your gym workout program</div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" autocomplete="email" required>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
    </div>

    <div class="button-group">
        <button id="signInBtn" class="primary-btn" onclick="login()">Sign In</button>
        <button id="createBtn" class="secondary-btn" onclick="register()">Create Account</button>
    </div>

    <div class="gym-gif">
        <img src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif" alt="Gym motivation animation">
    </div>

    <div class="message" id="message"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTQDlsZNhZ-I6CvlNgZDPgpJJYlYto6Rk",
  authDomain: "jalandhar-fitness-club.firebaseapp.com",
  projectId: "jalandhar-fitness-club",
  storageBucket: "jalandhar-fitness-club.firebasestorage.app",
  messagingSenderId: "899365845803",
  appId: "1:899365845803:web:a75a331462df8b017f236e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPYoPFV6Ez73oq38hebKGFYEEqyOhCd8gBxwlChwJUoGWOc2HiEFurNUX2KXidjz0/exec";
const SECRET = "JFC2026PRIVATEKEY";

function setBusy(isBusy) {
    document.getElementById("signInBtn").disabled = isBusy;
    document.getElementById("createBtn").disabled = isBusy;
}

function setMessage(text, color = "#ffffff") {
    const message = document.getElementById("message");
    message.style.color = color;
    message.textContent = text;
}

function getCredentials() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        setMessage("Please enter both email and password.", "#ff9090");
        return null;
    }

    return { email, password };
}

window.login = async function() {
    const credentials = getCredentials();
    if (!credentials) return;

    setBusy(true);
    setMessage("Signing in...");

    try {
        await signInWithEmailAndPassword(auth, credentials.email, credentials.password);
        window.location.href = "dashboard.html";
    } catch (error) {
        setMessage(error.message, "#ff9090");
    } finally {
        setBusy(false);
    }
};

window.register = async function() {
    const credentials = getCredentials();
    if (!credentials) return;

    setBusy(true);
    setMessage("Creating account...");

    try {
        await createUserWithEmailAndPassword(auth, credentials.email, credentials.password);

        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: credentials.email, secret: SECRET })
        });

        setMessage(
            "Account created successfully.\n\n" +
            "Subscribe first for gym access.\n" +
            "Approval within 24 hours.\n" +
            "Redirecting to dashboard...",
            "#6fffd2"
        );

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 5000);
    } catch (error) {
        setMessage(error.message, "#ff9090");
        setBusy(false);
    }
};
</script>
</body>
</html>
